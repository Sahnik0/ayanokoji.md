description = "Audit the scaffold files (AGENTS.md, CONTEXT.md, TASK.md, PROGRESS.md) for drift, staleness, and protocol violations"
prompt = "Audit all four Ayanokoji scaffold files. Check AGENTS.md: does it exceed 60 lines? Are constraints specific imperatives? Check CONTEXT.md: is it describing architecture (not a file tree)? Are modules listed with purpose, dependencies, and danger zones? Check TASK.md: is it a single bounded task? Is the acceptance criterion runnable? Are in-scope and out-of-scope files explicit? Check PROGRESS.md: are there more than 5 detailed entries (should compress)? Are failed attempts logged with exact errors? Report findings: FILE: <issue>. End with net scaffold health: HEALTHY or NEEDS MAINTENANCE."

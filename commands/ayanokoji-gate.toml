description = "Run the verification gate checks for the current task and update scaffold files based on the result"
prompt = "Execute the verification gate. (1) Read TASK.md and run the exact command or check specified in its Acceptance Criteria. (2) Capture the actual output of the check. (3) If the check passes: Update PROGRESS.md by adding the task to Completed Tasks, including the actual verification output. Blank TASK.md to declare it finished. Report success with the output. (4) If the check fails: Log the failure under PROGRESS.md Failed Attempts (with exact error and what must never be repeated). Guide the agent to update TASK.md Approach and Known Risks. Report the failure, and stop."

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&amp;display=swap');
    </style>

    <!-- Roughen / wobbly stroke filter for hand-drawn feel -->
    <filter id="roughen" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" seed="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <!-- Lighter wobble for text underline / highlight shapes -->
    <filter id="roughenLight" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.055" numOctaves="2" seed="5" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <!-- Soft shadow for the outer border box -->
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-color="#b0a090" flood-opacity="0.35"/>
    </filter>

    <!-- Clip to keep contents inside rounded rect -->
    <clipPath id="canvasClip">
      <rect width="900" height="300" rx="18"/>
    </clipPath>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <!-- Cream / off-white paper background -->
  <rect width="900" height="300" rx="18" fill="#fdf9f2" filter="url(#shadow)"/>

  <!-- Very subtle grid paper dots -->
  <g opacity="0.07" clip-path="url(#canvasClip)">
    <pattern id="grid" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#888"/>
    </pattern>
    <rect width="900" height="300" fill="url(#grid)"/>
  </g>

  <!-- ===== OUTER DOODLE BORDER ===== -->
  <rect x="6" y="6" width="888" height="288" rx="15"
    fill="none" stroke="#2a2a2a" stroke-width="2.8"
    stroke-linecap="round" stroke-linejoin="round"
    filter="url(#roughen)"/>
  <rect x="11" y="11" width="878" height="278" rx="12"
    fill="none" stroke="#2a2a2a" stroke-width="1"
    stroke-linecap="round" stroke-linejoin="round"
    stroke-dasharray="6,4"
    filter="url(#roughen)" opacity="0.35"/>

  <!-- ===== CORNER DOODLE ACCENTS ===== -->
  <path d="M22,22 L22,46 M22,22 L46,22" fill="none" stroke="#2a2a2a" stroke-width="2.4" stroke-linecap="round" filter="url(#roughen)"/>
  <path d="M878,22 L878,46 M878,22 L854,22" fill="none" stroke="#2a2a2a" stroke-width="2.4" stroke-linecap="round" filter="url(#roughen)"/>
  <path d="M22,278 L22,254 M22,278 L46,278" fill="none" stroke="#2a2a2a" stroke-width="2.4" stroke-linecap="round" filter="url(#roughen)"/>
  <path d="M878,278 L878,254 M878,278 L854,278" fill="none" stroke="#2a2a2a" stroke-width="2.4" stroke-linecap="round" filter="url(#roughen)"/>

  <!-- ===== TOP SPARKLE / STAR DOODLES ===== -->
  <g opacity="0.9" filter="url(#roughen)">
    <line x1="68" y1="30" x2="68" y2="52" stroke="#f5c842" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="57" y1="41" x2="79" y2="41" stroke="#f5c842" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="61" y1="34" x2="75" y2="48" stroke="#f5c842" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="75" y1="34" x2="61" y2="48" stroke="#f5c842" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <g opacity="0.7" filter="url(#roughen)">
    <line x1="96" y1="22" x2="96" y2="36" stroke="#f5c842" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="89" y1="29" x2="103" y2="29" stroke="#f5c842" stroke-width="1.6" stroke-linecap="round"/>
  </g>
  <path d="M112,41 L128,41" fill="none" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round" filter="url(#roughen)" opacity="0.55"/>
  <path d="M122,35 L130,42 L122,49" fill="none" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" filter="url(#roughen)" opacity="0.55"/>
  <path d="M144,37 L153,28 L162,37 L171,28 L180,37" fill="none" stroke="#e05a2b" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" filter="url(#roughen)" opacity="0.65"/>

  <g opacity="0.9" filter="url(#roughen)">
    <line x1="832" y1="30" x2="832" y2="52" stroke="#f5c842" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="821" y1="41" x2="843" y2="41" stroke="#f5c842" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="825" y1="34" x2="839" y2="48" stroke="#f5c842" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="839" y1="34" x2="825" y2="48" stroke="#f5c842" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <g opacity="0.7" filter="url(#roughen)">
    <line x1="806" y1="22" x2="806" y2="36" stroke="#f5c842" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="799" y1="29" x2="813" y2="29" stroke="#f5c842" stroke-width="1.6" stroke-linecap="round"/>
  </g>
  <path d="M756,37 L765,28 L774,37 L783,28 L792,37" fill="none" stroke="#e05a2b" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" filter="url(#roughen)" opacity="0.65"/>

  <!-- ===== BOTTOM DOODLE ACCENTS ===== -->
  <g fill="#4caf7d" opacity="0.75">
    <circle cx="60" cy="264" r="5" filter="url(#roughen)"/>
    <circle cx="78" cy="264" r="3.2" filter="url(#roughen)"/>
    <circle cx="92" cy="264" r="5.5" filter="url(#roughen)"/>
  </g>
  <path d="M54,274 Q72,270 90,274 Q108,278 124,274" fill="none" stroke="#4caf7d" stroke-width="2" stroke-linecap="round" filter="url(#roughen)" opacity="0.5"/>
  <g fill="#7b5ea7" opacity="0.75">
    <circle cx="808" cy="264" r="5" filter="url(#roughen)"/>
    <circle cx="826" cy="264" r="3.2" filter="url(#roughen)"/>
    <circle cx="840" cy="264" r="5.5" filter="url(#roughen)"/>
  </g>
  <path d="M780,274 Q798,270 816,274 Q834,278 848,274" fill="none" stroke="#7b5ea7" stroke-width="2" stroke-linecap="round" filter="url(#roughen)" opacity="0.5"/>
  <path d="M54,248 L108,248" fill="none" stroke="#2a2a2a" stroke-width="1.4" stroke-linecap="round" stroke-dasharray="5,4" filter="url(#roughen)" opacity="0.4"/>
  <path d="M102,242 L110,249 L102,256" fill="none" stroke="#2a2a2a" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" filter="url(#roughen)" opacity="0.4"/>
  <path d="M846,248 L792,248" fill="none" stroke="#2a2a2a" stroke-width="1.4" stroke-linecap="round" stroke-dasharray="5,4" filter="url(#roughen)" opacity="0.4"/>
  <path d="M798,242 L790,249 L798,256" fill="none" stroke="#2a2a2a" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" filter="url(#roughen)" opacity="0.4"/>

  <!-- ===== HEXAGON LOGO ===== -->
  <!-- Hex fill — light green tint -->
  <polygon points="200,80 254,112 254,176 200,208 146,176 146,112" fill="#e8f7ee" opacity="0.9"/>
  <!-- Outer hexagon — hand-drawn outline -->
  <polygon points="200,80 254,112 254,176 200,208 146,176 146,112"
    fill="none" stroke="#2a2a2a" stroke-width="2.6" stroke-linejoin="round" filter="url(#roughen)"/>
  <!-- Inner hexagon rotated -->
  <polygon points="200,98 244,122 244,170 200,194 156,170 156,122"
    fill="none" stroke="#4caf7d" stroke-width="1.4" stroke-linejoin="round"
    opacity="0.55" transform="rotate(30 200 144)" filter="url(#roughen)"/>
  <!-- Eye ellipse -->
  <ellipse cx="200" cy="144" rx="38" ry="23"
    fill="#fff" stroke="#2a2a2a" stroke-width="2.2" filter="url(#roughen)"/>
  <!-- Eye lids -->
  <path d="M162,144 Q200,110 238,144" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round" filter="url(#roughen)"/>
  <path d="M162,144 Q200,178 238,144" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round" filter="url(#roughen)"/>
  <!-- Iris -->
  <circle cx="200" cy="144" r="13" fill="#4caf7d" stroke="#2a2a2a" stroke-width="2" filter="url(#roughen)"/>
  <!-- Pupil -->
  <circle cx="200" cy="144" r="6" fill="#1a1a1a" filter="url(#roughen)"/>
  <!-- Eye shine -->
  <circle cx="204" cy="140" r="2.8" fill="#ffffff" opacity="0.9"/>
  <!-- Vertex dots -->
  <circle cx="200" cy="80"  r="4" fill="#f5c842" stroke="#2a2a2a" stroke-width="1.4" filter="url(#roughen)"/>
  <circle cx="254" cy="112" r="4" fill="#f5c842" stroke="#2a2a2a" stroke-width="1.4" filter="url(#roughen)"/>
  <circle cx="254" cy="176" r="4" fill="#f5c842" stroke="#2a2a2a" stroke-width="1.4" filter="url(#roughen)"/>
  <circle cx="200" cy="208" r="4" fill="#f5c842" stroke="#2a2a2a" stroke-width="1.4" filter="url(#roughen)"/>
  <circle cx="146" cy="176" r="4" fill="#f5c842" stroke="#2a2a2a" stroke-width="1.4" filter="url(#roughen)"/>
  <circle cx="146" cy="112" r="4" fill="#f5c842" stroke="#2a2a2a" stroke-width="1.4" filter="url(#roughen)"/>
  <!-- Corner-to-eye lines -->
  <line x1="200" y1="80"  x2="200" y2="121" stroke="#4caf7d" stroke-width="1.1" opacity="0.45" stroke-dasharray="3,3" filter="url(#roughen)"/>
  <line x1="254" y1="112" x2="233" y2="134" stroke="#4caf7d" stroke-width="1.1" opacity="0.45" stroke-dasharray="3,3" filter="url(#roughen)"/>
  <line x1="254" y1="176" x2="233" y2="154" stroke="#4caf7d" stroke-width="1.1" opacity="0.45" stroke-dasharray="3,3" filter="url(#roughen)"/>
  <line x1="200" y1="208" x2="200" y2="167" stroke="#4caf7d" stroke-width="1.1" opacity="0.45" stroke-dasharray="3,3" filter="url(#roughen)"/>
  <line x1="146" y1="176" x2="167" y2="154" stroke="#4caf7d" stroke-width="1.1" opacity="0.45" stroke-dasharray="3,3" filter="url(#roughen)"/>
  <line x1="146" y1="112" x2="167" y2="134" stroke="#4caf7d" stroke-width="1.1" opacity="0.45" stroke-dasharray="3,3" filter="url(#roughen)"/>

  <!-- ===== TEXT BLOCK ===== -->

  <!-- Yellow marker highlight behind title -->
  <path d="M313,122 Q318,114 822,114 Q828,114 828,126 Q828,138 822,140 Q550,143 313,140 Q307,139 307,132 Z"
    fill="#f5e642" opacity="0.6" filter="url(#roughenLight)"/>

  <!-- Wavy rule above title -->
  <path d="M313,110 Q370,106 430,110 Q490,114 550,110 Q610,106 670,110 Q730,114 792,110 Q815,108 825,110"
    fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round" filter="url(#roughen)" opacity="0.5"/>

  <!-- Main title -->
  <text
    x="316" y="153"
    font-family="'Nunito', 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif"
    font-size="52"
    font-weight="900"
    letter-spacing="14"
    fill="#1a1a1a"
  >AYANOKOJI</text>

  <!-- Subtitle label box -->
  <rect x="314" y="164" width="234" height="26" rx="7"
    fill="#e8f7ee" stroke="#4caf7d" stroke-width="2"
    filter="url(#roughen)"/>
  <text
    x="321" y="182"
    font-family="'Nunito', 'Comic Sans MS', cursive, sans-serif"
    font-size="11.5"
    font-weight="700"
    letter-spacing="4"
    fill="#2a7a50"
  >PROJECT  INIT  SKILL</text>

  <!-- Wavy rule below subtitle -->
  <path d="M313,200 Q370,196 430,200 Q490,204 550,200 Q610,196 670,200 Q730,204 792,200 Q815,198 825,200"
    fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round" filter="url(#roughen)" opacity="0.5"/>

  <!-- Tagline -->
  <circle cx="316" cy="220" r="4" fill="#e05a2b" filter="url(#roughen)"/>
  <text
    x="327" y="224"
    font-family="'Nunito', 'Comic Sans MS', cursive, sans-serif"
    font-size="10.5"
    font-weight="700"
    letter-spacing="3"
    fill="#444"
  >UNIVERSAL  AGENT  PROTOCOL</text>

  <!-- Three-dot ellipsis -->
  <g fill="#aaa" opacity="0.8">
    <circle cx="696" cy="220" r="2.8" filter="url(#roughen)"/>
    <circle cx="708" cy="220" r="2.8" filter="url(#roughen)"/>
    <circle cx="720" cy="220" r="2.8" filter="url(#roughen)"/>
  </g>

  <!-- Doodle robot icon -->
  <rect x="736" y="197" width="36" height="30" rx="9"
    fill="#fff" stroke="#2a2a2a" stroke-width="2"
    filter="url(#roughen)"/>
  <circle cx="747" cy="210" r="4" fill="#4caf7d" stroke="#1a1a1a" stroke-width="1.5" filter="url(#roughen)"/>
  <circle cx="762" cy="210" r="4" fill="#4caf7d" stroke="#1a1a1a" stroke-width="1.5" filter="url(#roughen)"/>
  <path d="M747,220 Q754,227 762,220" fill="none" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round" filter="url(#roughen)"/>
  <line x1="754" y1="197" x2="754" y2="188" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round" filter="url(#roughen)"/>
  <circle cx="754" cy="186" r="3.5" fill="#e05a2b" stroke="#2a2a2a" stroke-width="1.4" filter="url(#roughen)"/>

  <!-- Doodle lock icon -->
  <path d="M795,204 Q795,197 803,197 Q811,197 811,204" fill="none" stroke="#7b5ea7" stroke-width="2.2" stroke-linecap="round" filter="url(#roughen)"/>
  <rect x="791" y="204" width="22" height="18" rx="5"
    fill="#ede8f7" stroke="#7b5ea7" stroke-width="2"
    filter="url(#roughen)"/>
  <circle cx="802" cy="212" r="3" fill="#7b5ea7" filter="url(#roughen)"/>

  <!-- Connector dots between robot and lock -->
  <g fill="#e05a2b" opacity="0.75">
    <circle cx="780" cy="213" r="3" filter="url(#roughen)"/>
    <circle cx="787" cy="209" r="2" filter="url(#roughen)"/>
  </g>

</svg>
